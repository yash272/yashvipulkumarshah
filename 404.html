<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Yash Shah</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,340;0,9..144,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: #f4eddd;
        color: #18140c;
        font-family: "Inter", system-ui, sans-serif;
        padding: 24px;
        text-align: center;
      }

      .kicker {
        font-family: "DM Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #6b6350;
      }

      h1 {
        margin-top: 18px;
        font-family: "Fraunces", Georgia, serif;
        font-weight: 700;
        font-size: clamp(48px, 10vw, 120px);
        letter-spacing: -0.05em;
        line-height: 0.9;
      }

      h1 em {
        font-style: italic;
        font-weight: 340;
      }

      .note {
        margin: 22px auto 0;
        max-width: 360px;
        color: #e8442e;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        line-height: 1.7;
        transform: rotate(-1.2deg);
      }

      a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 30px;
        padding: 13px 22px;
        border-radius: 999px;
        background: #18140c;
        color: #f4eddd;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-decoration: none;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      a:hover {
        background: #e8442e;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Fig. 404 — Not part of the teardown</p>
      <h1>This page got <em>torn out.</em></h1>
      <p class="note">✳ Whatever was here didn't survive the annotation process. The three live products did.</p>
      <a href="/">Back to the portfolio ↖</a>
    </main>
  </body>
</html>
